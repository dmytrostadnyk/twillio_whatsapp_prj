name: CI

on:
  push:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run linter
        run: ruff check .

      - name: Run tests
        env:
          TWILIO_ACCOUNT_SID: ACtest00000000000000000000000000000
          TWILIO_AUTH_TOKEN: test_auth_token_for_unit_tests_only
          TWILIO_PHONE_NUMBER: "+15550000000"
          TWILIO_WHATSAPP_NUMBER: "whatsapp:+14155238886"
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: fake_service_role_key
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          OPENAI_API_KEY: sk-fake
          COHERE_API_KEY: fake
          DEEPGRAM_API_KEY: fake
          HUBSPOT_PRIVATE_APP_TOKEN: pat-na1-fake-token-for-ci
          AI_ENABLED: "false"
          PUBLIC_BASE_URL: https://fake.ngrok-free.app
        run: pytest tests/unit -v
